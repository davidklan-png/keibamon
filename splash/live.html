<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Keibamon Live</title>
<style>
  :root{ color-scheme: light; --pad: env(safe-area-inset-bottom, 0px); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; }
  body{
    background:#f4f5f7; color:#15181d;
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-text-size-adjust:100%;
  }
  .wrap{ max-width:720px; margin:0 auto; padding:0 12px calc(40px + var(--pad)); }
  header{
    position:sticky; top:0; z-index:10; background:rgba(244,245,247,.94);
    backdrop-filter:saturate(180%) blur(8px);
    padding:max(10px, env(safe-area-inset-top)) 12px 8px; margin:0 -12px 4px;
    border-bottom:1px solid #e6e8ee;
  }
  .hrow{ display:flex; align-items:center; gap:10px; max-width:720px; margin:0 auto; }
  .back{
    appearance:none; border:1px solid #d7dbe2; background:#fff; color:#15181d;
    font-weight:700; font-size:14px; border-radius:9px; padding:7px 12px; min-height:38px;
  }
  .back:active{ background:#eef0f4; }
  h1{ font-size:18px; margin:0; letter-spacing:.2px; flex:1; min-width:0;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .statusline{ display:flex; align-items:center; gap:8px; margin-top:6px;
      font-size:12.5px; color:#5b6472; max-width:720px; }
  .badge{ font-size:10.5px; font-weight:800; padding:2px 8px; border-radius:999px;
      text-transform:uppercase; letter-spacing:.4px; }
  .badge.live,.badge.open{ background:#e4f7ec; color:#11783f; }
  .badge.waiting,.badge.standby{ background:#fff2d6; color:#8a6100; }
  .badge.closed{ background:#e7e9ee; color:#4a5160; }
  .badge.final{ background:#15181d; color:#fff; }
  .badge.error{ background:#fde4e4; color:#a01b1b; }
  .dot{ width:8px;height:8px;border-radius:50%; display:inline-block; background:#23a35a; }
  .dot.stale{ background:#d39400; } .dot.off{ background:#b3b9c4; }
  .banner{ background:#fff; border:1px solid #e6e8ee; border-radius:12px; padding:14px; margin:10px 0; color:#3a414e; font-size:13.5px; }
  /* index list */
  .rlist{ margin:8px 0; }
  .rrow{
    display:flex; align-items:center; gap:11px; width:100%; text-align:left;
    background:#fff; border:1px solid #e6e8ee; border-radius:12px;
    padding:12px 13px; margin:8px 0; min-height:56px; cursor:pointer;
    box-shadow:0 1px 2px rgba(20,24,29,.04);
  }
  .rrow:active{ background:#f7f8fa; }
  .rrow.feature{ border-color:#cdb36b; }
  .rno{ font-weight:800; font-size:14px; background:#15181d; color:#fff; border-radius:8px;
      padding:4px 0; min-width:40px; text-align:center; }
  .rmid{ flex:1; min-width:0; }
  .rmid .nm{ font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rmid .mt{ color:#6b7280; font-size:12px; margin-top:1px; }
  .top3{ font-size:13px; color:#15181d; font-weight:700; white-space:nowrap; }
  .top3 .pos{ color:#8a6100; }
  .chev{ color:#c3c8d2; font-size:20px; }
  /* detail */
  .card{ background:#fff; border:1px solid #e6e8ee; border-radius:12px; margin:12px 0; overflow:hidden; }
  .card.feature{ border-color:#cdb36b; box-shadow:0 0 0 1px #cdb36b inset; }
  .dtop{ padding:13px 14px; border-bottom:1px solid #eef0f4; }
  .dtop .nm{ font-weight:800; font-size:17px; }
  .dtop .mt{ color:#5b6472; font-size:12.5px; margin-top:3px; }
  .resultbox{ background:#fbfaf5; border:1px solid #ece3c6; border-radius:10px; padding:10px 12px; margin:12px 0; }
  .resultbox b{ font-size:12px; text-transform:uppercase; letter-spacing:.4px; color:#8a6100; }
  .resultbox .line{ font-size:16px; font-weight:800; margin-top:4px; }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th,td{ padding:8px; text-align:right; border-bottom:1px solid #f0f1f5; }
  th{ font-size:10.5px; text-transform:uppercase; letter-spacing:.4px; color:#8a93a3; font-weight:700; }
  th:nth-child(2),td:nth-child(2){ text-align:left; }
  td.uma{ font-weight:800; text-align:center; width:30px; }
  td.name{ font-weight:600; }
  .odds{ font-variant-numeric:tabular-nums; font-weight:700; }
  .drift{ font-variant-numeric:tabular-nums; font-size:12px; }
  .drift.in{ color:#c0392b; } .drift.out{ color:#2563c9; } .drift.flat{ color:#9aa1ad; }
  .edge{ display:inline-block; font-size:10px; font-weight:800; color:#11783f; background:#e4f7ec; border-radius:5px; padding:1px 5px; }
  .row-edge{ background:#f5fbf7; }
  .cap{ font-size:11.5px; color:#6b7280; padding:9px 14px; border-top:1px solid #f0f1f5; }
  .payt td{ font-size:12.5px; }
  .empty{ color:#8a93a3; font-style:italic; padding:14px; text-align:center; }
  .foot{ text-align:center; color:#9aa1ad; font-size:11px; margin-top:18px; }
  .err{ color:#a01b1b; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hrow">
      <button class="back" id="back" style="display:none" onclick="location.hash=''">‹ Races</button>
      <h1 id="htitle">Keibamon Live</h1>
    </div>
    <div class="statusline">
      <span id="badge" class="badge standby">standby</span>
      <span class="dot off" id="dot"></span>
      <span id="freshness">loading…</span>
    </div>
  </header>
  <div id="view"></div>
  <div class="foot">
    Live odds &amp; drift · model edge vs market · informational only — no betting advice.
  </div>
</div>

<script>
const POS = ["", "①", "②", "③", "④", "⑤"];
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?"":s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const num = (v,d=1) => (v==null||isNaN(v)) ? "—" : Number(v).toFixed(d);
const yen = (v) => (v==null||isNaN(v)) ? "—" : "¥"+Number(v).toLocaleString();
let SNAP = null;

function ago(iso){
  if(!iso) return "—";
  const s = Math.max(0,(Date.now()-Date.parse(iso))/1000);
  if(s<60) return Math.round(s)+"s ago";
  if(s<3600) return Math.round(s/60)+"m ago";
  return Math.round(s/3600)+"h ago";
}
function badgeKind(st){
  if(st==="live"||st==="open") return "open";
  if(st==="final") return "final";
  if(st==="closed") return "closed";
  return "waiting";
}
function setHeaderStatus(){
  const m = (SNAP&&SNAP.meta)||{};
  const k = m.status==="live" ? "open" : (m.status||"standby");
  const b=$("badge"); b.className="badge "+badgeKind(m.status); b.textContent=m.status||"standby";
  const d=$("dot"); d.className="dot "+(m.status==="live"?"":m.status==="closed"?"off":"stale");
  $("freshness").textContent = "updated "+ago(m.published_at);
}
function top3Line(result){
  if(!result||!result.top3||!result.top3.length) return "";
  return result.top3.map(t=>`<span class="pos">${POS[t.pos]||t.pos}</span>${esc(t.umaban)}`).join("&nbsp; ");
}

function renderIndex(){
  $("back").style.display="none";
  $("htitle").textContent="Keibamon Live";
  setHeaderStatus();
  const m=(SNAP&&SNAP.meta)||{};
  const races=(SNAP&&SNAP.races)||[];
  let html="";
  if(m.message) html+=`<div class="banner"><b>${m.source==="preview"?"Preview":"Note"}.</b> ${esc(m.message)}</div>`;
  if(!races.length){ $("view").innerHTML=html+'<div class="empty">No races published yet.</div>'; return; }
  html+='<div class="rlist">';
  for(const r of races){
    const feature=/takarazuka|g1|gi\b/i.test(r.name||"");
    const right = r.status==="final"
      ? `<span class="top3">${top3Line(r.result)}</span>`
      : `<span class="badge ${badgeKind(r.status)}">${esc(r.status||"waiting")}</span>`;
    html+=`<div class="rrow ${feature?"feature":""}" onclick="location.hash='#race/${r.race_no}'">
      <span class="rno">R${esc(r.race_no)}</span>
      <span class="rmid"><div class="nm">${esc(r.name||("Race "+r.race_no))}</div>
        <div class="mt">post ${esc(r.post_time_jst||"—")} JST</div></span>
      ${right}<span class="chev">›</span>
    </div>`;
  }
  html+="</div>";
  $("view").innerHTML=html;
}

function runnerRows(runners){
  if(!runners||!runners.length)
    return '<tr><td colspan="6" class="empty">No live odds in this snapshot.</td></tr>';
  const rs=runners.slice().sort((a,b)=>(a.win_odds??1e9)-(b.win_odds??1e9));
  return rs.map(r=>{
    const edge=r.edge_label?`<span class="edge">${esc(r.edge_label)}</span>`:"";
    const drift=(()=>{ const o=r.win_odds,op=r.win_open;
      if(o==null||op==null||op===0) return '<span class="drift flat">—</span>';
      const p=(o-op)/op*100; if(Math.abs(p)<1) return '<span class="drift flat">±0%</span>';
      return `<span class="drift ${p<0?"in":"out"}">${p<0?"▼":"▲"}${Math.abs(p).toFixed(0)}%</span>`; })();
    const place=(r.place_low!=null)?`${num(r.place_low)}–${num(r.place_high)}`:"—";
    return `<tr class="${r.edge_label?"row-edge":""}">
      <td class="uma">${esc(r.umaban)}</td><td class="name">${esc(r.name)} ${edge}</td>
      <td class="odds">${num(r.win_odds)}</td><td>${drift}</td>
      <td>${place}</td><td>${r.model_rank!=null?"#"+esc(r.model_rank):"—"}</td></tr>`;
  }).join("");
}
function payoutRows(payouts){
  if(!payouts||!payouts.length) return "";
  const r=payouts.map(p=>`<tr><td class="name">${esc(p.pool)}</td><td>${esc(p.combo)}</td><td class="odds">${yen(p.yen)}</td></tr>`).join("");
  return `<table class="payt"><thead><tr><th style="text-align:left">Pool</th><th style="text-align:left">Combo</th><th>Payout</th></tr></thead><tbody>${r}</tbody></table>`;
}

function renderDetail(no){
  const r=((SNAP&&SNAP.races)||[]).find(x=>String(x.race_no)===String(no));
  $("back").style.display="";
  setHeaderStatus();
  if(!r){ $("htitle").textContent="Race "+no; $("view").innerHTML='<div class="empty">Race not found.</div>'; return; }
  $("htitle").textContent="R"+r.race_no+" · "+(r.name||"");
  const feature=/takarazuka|g1|gi\b/i.test(r.name||"");
  const cap=r.capture||{};
  const pools=(cap.pools&&cap.pools.length)?cap.pools.join(" · "):"—";
  let html=`<div class="card ${feature?"feature":""}">
    <div class="dtop"><div class="nm">${esc(r.name||("Race "+r.race_no))}
      <span class="badge ${badgeKind(r.status)}">${esc(r.status||"waiting")}</span></div>
      <div class="mt">post ${esc(r.post_time_jst||"—")} JST</div></div>`;
  if(r.status==="final"&&r.result){
    html+=`<div style="padding:0 14px"><div class="resultbox"><b>Result</b>
      <div class="line">${top3Line(r.result)}</div></div>${payoutRows(r.result.payouts)}</div>`;
  }
  html+=`<table><thead><tr><th>#</th><th>Horse</th><th>Win</th><th>Drift</th><th>Place</th><th>Model</th></tr></thead>
    <tbody>${runnerRows(r.runners)}</tbody></table>
    <div class="cap">↻ ${ago(cap.last_update)} · ${cap.polls||0} polls · pools: ${esc(pools)}</div></div>`;
  $("view").innerHTML=html;
}

function route(){
  const h=location.hash;
  if(h.indexOf("#race/")===0) renderDetail(h.slice(6));
  else renderIndex();
  window.scrollTo(0,0);
}
async function load(){
  try{
    const res=await fetch("/api/live",{cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    SNAP=await res.json();
    route();
  }catch(e){
    $("badge").className="badge error"; $("badge").textContent="error";
    $("freshness").textContent="connection error";
    $("view").innerHTML=`<div class="banner err"><b>Couldn't load live data.</b><br>${esc(e&&e.message||e)}<br>Retrying…</div>`;
  }
}
window.addEventListener("hashchange", ()=>{ if(SNAP) route(); });
load();
setInterval(load, 45000);
</script>
</body>
</html>
