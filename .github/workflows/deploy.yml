name: Deploy to Cloudflare

# Single source of truth for production: only a push to main deploys, only from
# CI, always built fresh. This eliminates the two failure modes that broke /app/:
#   - deploying from a stale local checkout (splash/app not rebuilt → bad manifest)
#   - two deploy identities racing (the concurrency group serializes deploys)
# Workers Builds (Cloudflare "Connect to Git") was disabled 2026-06-27 after it
# repeatedly clobbered CI deploys with a build that omitted the frontend step.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two prod deploys at once; never cancel a deploy mid-flight.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            workers/social/package-lock.json

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      # Root suite (Worker: weekly/form/settle) + typecheck — gate the deploy on green.
      - name: Install root deps
        run: npm ci
      - name: Root tests
        run: npm test
      - name: Root typecheck
        run: npm run tsc

      # Social worker (D1: tickets/cheers/follows/settle) — typecheck + unit tests.
      - name: Install social worker deps
        run: npm ci
        working-directory: workers/social
      - name: Social worker typecheck
        run: npx tsc --noEmit
        working-directory: workers/social
      - name: Social worker tests
        run: npx vitest run
        working-directory: workers/social

      # Python lake/pipeline suite. requirements-ci.txt is the minimal subset of
      # pyproject [project.dependencies] the collected tests import; PYTHONPATH=src
      # is belt-and-suspenders over pyproject's [tool.pytest.ini_options].pythonpath.
      - name: Install Python deps
        run: pip install -r requirements-ci.txt
      - name: Python tests
        run: PYTHONPATH=src python -m pytest -q

      # Frontend: test, then build INTO splash/app so the deploy manifest is fresh.
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend
      - name: Frontend tests
        run: npm test
        working-directory: frontend
      # Vite inlines VITE_* at build time. frontend/.env is gitignored, so CI must
      # supply the Clerk key + social-Worker base or the bundle ships auth-disabled
      # (the silent-failure trap in docs/runbooks/deploy-public-app.md). Fail loud
      # if the key is missing, and assert it actually landed in the bundle.
      - name: Build SPA into splash/app
        run: |
          test -n "$VITE_CLERK_PUBLISHABLE_KEY" || { echo "::error::VITE_CLERK_PUBLISHABLE_KEY secret is empty — auth would ship broken"; exit 1; }
          npm run build
          grep -rq "pk_" ../splash/app/assets || { echo "::error::Clerk publishable key was not inlined into the bundle"; exit 1; }
        working-directory: frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SOCIAL_API_BASE: ${{ secrets.VITE_SOCIAL_API_BASE }}

      # Deploy the SOCIAL worker (keibamon-social: D1-backed tickets/shares/
      # feed/comments + the 5-min settle cron). CI has always gated this
      # worker's tests + tsc but never deployed it — that gap left every social
      # change to a manual `cd workers/social && npx wrangler deploy`, and the
      # social worker could silently drift out of sync with the app shell.
      # Social-first (before the root worker) so the feed contract the frontend
      # depends on is live before the app that consumes it. Same API token as
      # the root deploy; if that token isn't account-scoped to keibamon-social,
      # this step fails loud (the correct behavior) — widen the token to fix.
      - name: Deploy social worker
        run: npx wrangler deploy
        working-directory: workers/social
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Deploy the root Worker + static assets (splash/ incl. the freshly built app).
      - name: Deploy root worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Fail loudly if the live app shell isn't 200 right after deploy.
      - name: Smoke-check /app/
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" https://keibamon.com/app/)
          echo "/app/ → $code"
          test "$code" = "200"
